<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CHIP-8 Visualizer</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://cdn.jsdelivr.net/pyodide/v0.27.2/full/pyodide.js"></script>
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace">
        <header class="topbar">
          <div>
            <h1>CHIP-8 Visualizer</h1>
          </div>
          <div id="status" class="status">Loading Pyodide...</div>
        </header>

        <section class="emulator-grid">
          <div class="play-area">
            <div class="screen-panel">
              <canvas id="screen" width="640" height="320"></canvas>
              <div class="controls">
                <button id="runPause" type="button" disabled>Run</button>
                <button id="step" type="button" disabled>Step</button>
                <button id="stepFrame" type="button" disabled>Step Frame</button>
                <button id="runToDraw" type="button" disabled>Run to Draw</button>
                <button id="reset" type="button" disabled>Reset</button>
                <label class="select-field">
                  ROM
                  <select id="builtInRom" disabled></select>
                </label>
                <label class="file-button">
                  Load Custom ROM
                  <input id="romFile" type="file" accept=".ch8,.rom,application/octet-stream" />
                </label>
              </div>
              <div class="speed-row">
                <label for="speed">Cycles/frame</label>
                <input id="speed" type="range" min="1" max="40" value="10" />
                <span id="speedValue">10</span>
              </div>
              <div class="speed-row">
                <label for="debugRate">Debug updates</label>
                <select id="debugRate">
                  <option value="1000">1/sec</option>
                  <option value="500">2/sec</option>
                  <option value="200" selected>5/sec</option>
                  <option value="100">10/sec</option>
                  <option value="0">Every frame</option>
                </select>
              </div>
            </div>

            <section class="keypad">
              <h2>Keypad</h2>
              <div id="keys" class="key-grid"></div>
            </section>
          </div>

          <aside class="debug-panel">
            <section>
              <h2>Instruction</h2>
              <dl class="stat-list">
                <div><dt>Opcode</dt><dd id="opcode">----</dd></div>
                <div><dt>Decoded</dt><dd id="decoded">Waiting for ROM</dd></div>
                <div><dt>PC</dt><dd id="pc">0200</dd></div>
                <div><dt>I</dt><dd id="index">0000</dd></div>
              </dl>
            </section>

            <section>
              <h2>Registers</h2>
              <div id="registers" class="register-grid"></div>
            </section>

            <section>
              <h2>Timers & Stack</h2>
              <dl class="stat-list">
                <div><dt>Delay</dt><dd id="delay">0</dd></div>
                <div><dt>Sound</dt><dd id="sound">0</dd></div>
                <div><dt>Stack</dt><dd id="stack">[]</dd></div>
              </dl>
            </section>

            <section>
              <h2>Memory Near PC</h2>
              <div id="memory" class="memory-list"></div>
            </section>

            <section>
              <h2>Trace</h2>
              <div id="trace" class="trace-list"></div>
            </section>
          </aside>
        </section>

      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
